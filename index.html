<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'><circle cx='18' cy='18' r='17' stroke='%234f8ef7' stroke-width='1.5' fill='%23080f1c'/><path d='M10 22 Q14 12 18 18 Q22 24 26 14' stroke='%234f8ef7' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── SETUP SCREEN ── -->
  <div class="setup-screen" id="setupScreen">
    <div class="setup-card">
      <div class="setup-logo">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <circle cx="18" cy="18" r="17" stroke="currentColor" stroke-width="1.5"/>
          <path d="M10 22 Q14 12 18 18 Q22 24 26 14" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </svg>
        <span>Weather</span>
      </div>
      <h1>Добро пожаловать</h1>
      <p class="setup-sub">Приложению нужны два бесплатных API-ключа. Они сохранятся в вашем браузере и никуда не отправятся.</p>

      <div class="setup-fields">
        <div class="field-group">
          <label>OpenWeather API key
            <a href="https://home.openweathermap.org/users/sign_up" target="_blank" class="get-link">Получить бесплатно ↗</a>
          </label>
          <input type="text" id="inputOW" placeholder="62746161a995cac3369b2e3e…" autocomplete="off" spellcheck="false">
        </div>
        <div class="field-group">
          <label>PirateWeather API key
            <a href="https://pirate-weather.apiable.io/products/weather-data/plans" target="_blank" class="get-link">Получить бесплатно ↗</a>
          </label>
          <input type="text" id="inputPW" placeholder="GXjHMSbTn3WKm1X1NNTX…" autocomplete="off" spellcheck="false">
        </div>
      </div>

      <p class="setup-error" id="setupError"></p>
      <button class="setup-btn" id="setupBtn">Начать работу</button>

      <p class="setup-hint">Ключи хранятся только в <code>localStorage</code> вашего браузера</p>
    </div>
  </div>

  <!-- ── MAIN APP ── -->
  <div class="app" id="appScreen" style="display:none">
    <header class="app-header">
      <div class="header-inner container">
        <a href="." class="logo">
          <svg width="24" height="24" viewBox="0 0 36 36" fill="none">
            <circle cx="18" cy="18" r="17" stroke="currentColor" stroke-width="1.5"/>
            <path d="M10 22 Q14 12 18 18 Q22 24 26 14" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          </svg>
          Weather
        </a>
        <button class="reset-keys-btn" id="resetKeysBtn" title="Сбросить API-ключи">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/>
          </svg>
          Сменить ключи
        </button>
      </div>
    </header>

    <section class="search-section container">
      <h1 class="main-heading">Погода в <em>городе</em></h1>
      <form class="search-form" id="searchForm">
        <div class="search-wrap">
          <input type="text" id="cityInput" placeholder="Москва, Токио, Берлин…" autocomplete="off" autofocus>
          <button type="submit">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
          </button>
        </div>
        <p class="search-error" id="searchError"></p>
      </form>
    </section>

    <section class="results-section container" id="resultsSection">
      <ul class="cities-grid" id="citiesList"></ul>
      <button class="clear-btn" id="clearBtn" style="display:none">Очистить всё</button>
    </section>

    <footer class="app-footer container">
      <small>Study project by <a href="http://github.com/TheFlukas/" target="_blank">TheFlukas</a></small>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
